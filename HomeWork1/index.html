<!DOCTYPE html>
<html>
<head lang="uk">
    <meta charset="UTF-8">
    <title>Buy List</title>
    <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
<main class="container">
    <section class="card main-panel">
        <div class="add-item">
            <input type="text" id="new-item-name" placeholder="Назва товару" aria-label="Введіть назву товару">
            <button class="btn-add" id="btn-add-item" data-tooltip="Додати у список">Додати</button>
        </div>

        <div class="items-list" id="items-container">
        </div>
    </section>

    <section class="card side-panel">
        <div class="stats-group">
            <h3>Залишилося</h3>
            <div class="tags" id="left-to-buy-container">
            </div>
        </div>
        <hr>
        <div class="stats-group">
            <h3>Куплено</h3>
            <div class="tags bought" id="bought-container">
            </div>
        </div>
    </section>
</main>

<div class="badge">
    <div class="badge-title">Buy List</div>
    <div class="badge-author">Created by: Kondratenko Artem</div>
</div>

<script src="script.js"></script>
</body>
</html>
